<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彩顏 | 工作日誌系統</title>
    <style>
        :root {
            --bg-color: #fcfcfc; --card-bg: #ffffff; --text-main: #1a1a1a; --text-sub: #999999;
            --accent: #000000; --radius-lg: 20px; --radius-md: 12px;
        }
        body { font-family: "Noto Sans TC", sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background-color: var(--card-bg); padding: 50px 30px; border-radius: var(--radius-lg); box-shadow: 0 5px 30px rgba(0,0,0,0.02); box-sizing: border-box; }
        
        h2 { text-align: center; letter-spacing: 5px; margin-bottom: 40px; margin-top:0; font-weight: 800; font-size: 24px; }
        
        label { display: block; margin-top: 30px; font-size: 13px; color: var(--text-sub); letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        select, input { width: 100%; padding: 18px; border: none; background: #f5f5f5; border-radius: var(--radius-md); font-size: 16px; box-sizing: border-box; margin-top: 10px; outline: none; }
        
        .btn-add { background: #000; color: #fff; padding: 14px 28px; border-radius: var(--radius-md); border: none; cursor: pointer; font-weight: 600; }
        
        .list-box { background: #f9f9f9; border-radius: var(--radius-md); padding: 20px; margin: 12px 0 30px; font-size: 15px; min-height: 40px; line-height: 1.8; }
        
        .todo-item { display: flex; align-items: center; padding: 12px 0; cursor: pointer; }
        .todo-item.done span { text-decoration: line-through; color: #bbb; }
        .todo-checkbox { width: 22px; height: 22px; margin-right: 15px; accent-color: #000; cursor: pointer; }

        /* 生成按鈕：黑色 */
        .btn-main { background: #000; color: #fff; width: 100%; padding: 22px; font-size: 18px; font-weight: 700; border-radius: var(--radius-md); margin-top: 40px; border: none; cursor: pointer; letter-spacing: 5px; }
        
        /* 清空按鈕：灰色底、大字體 */
        .btn-clear { 
            background: #e0e0e0; 
            color: #444; 
            width: 100%; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: 700; 
            border-radius: var(--radius-md); 
            margin-top: 15px; 
            border: none; 
            cursor: pointer; 
            letter-spacing: 2px;
            transition: background 0.3s;
        }
        .btn-clear:active { background: #d0d0d0; }
        
        .flex-row { display: flex; gap: 12px; align-items: center; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 100; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; }
        .modal-content { background: white; width: 100%; max-width: 450px; text-align: center; }
        pre { text-align: left; background: #fff; padding: 0; font-size: 15px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; margin: 30px 0; color: #333; line-height: 1.8; font-family: inherit; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>彩顏 | 工作日誌</h2>
    
    <label>Date</label>
    <input type="date" id="log-date">

    <label>Specialist</label>
    <select id="user">
        <option value="小魚老師">小魚老師</option>
        <option value="南南老師">南南老師</option>
        <option value="貫坊首席">貫坊首席</option>
    </select>

    <label>Daily Record</label>
    <div class="flex-row">
        <input type="text" id="work-input" placeholder="請輸入內容">
        <button class="btn-add" onclick="addWork()">新增</button>
    </div>
    <div id="work-display" class="list-box">尚未輸入紀錄</div>

    <label>Checklist</label>
    <div class="flex-row">
        <input type="text" id="todo-input" placeholder="請輸入項目">
        <button class="btn-add" onclick="addTodo()">新增</button>
    </div>
    <div id="todo-display" class="list-box">尚未輸入待辦</div>

    <button class="btn-main" onclick="processAll()">生成並自動複製</button>
    
    <button class="btn-clear" onclick="confirmClear()">清空當前所有內容</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="letter-spacing: 3px;">PREVIEW / 內容預覽</h3>
        <p style="font-size:13px; color:var(--text-sub)">文字已自動複製至剪貼簿</p>
        <pre id="summary-text"></pre>
        <button class="btn-main" onclick="goToLine()">前往 LINE</button>
        <button style="background:none; border:none; color:var(--text-sub); margin-top:25px; cursor:pointer; font-size:14px;" onclick="closeModal()">返回</button>
    </div>
</div>

<script>
    let works = []; let todos = [];
    const STORAGE_KEY = 'CAI_YAN_Final_Storage';

    window.onload = () => {
        document.getElementById('log-date').valueAsDate = new Date();
        const cache = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (cache) {
            works = cache.works || []; todos = cache.todos || [];
            document.getElementById('user').value = cache.user;
            document.getElementById('log-date').value = cache.date || document.getElementById('log-date').value;
            updateDisplay();
        }
    };

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            date: document.getElementById('log-date').value, user: document.getElementById('user').value, works, todos
        }));
    }

    function addWork() {
        let val = document.getElementById('work-input').value;
        if(!val) return; works.push(val); updateDisplay();
        document.getElementById('work-input').value = ''; save();
    }

    function addTodo() {
        let val = document.getElementById('todo-input').value;
        if(!val) return; todos.push({text: val, done: false}); updateDisplay();
        document.getElementById('todo-input').value = ''; save();
    }

    function toggleTodo(i) { todos[i].done = !todos[i].done; updateDisplay(); save(); }

    function updateDisplay() {
        document.getElementById('work-display').innerHTML = works.map(w => `• ${w}<br>`).join('') || '尚未輸入紀錄';
        document.getElementById('todo-display').innerHTML = todos.map((t,i) => 
            `<div class="todo-item ${t.done?'done':''}" onclick="toggleTodo(${i})">
                <input type="checkbox" class="todo-checkbox" ${t.done?'checked':''}>
                <span>${t.text}</span>
            </div>`).join('') || '尚未輸入待辦';
    }

    async function processAll() {
        if(!works.length && !todos.length) return alert("內容是空的喔！");
        const dateInput = document.getElementById('log-date').value;
        const dateObj = new Date(dateInput);
        const shortDate = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
        const user = document.getElementById('user').value;
        
        let msg = `✨ 彩顏 | 工作日誌 ✨\n\n👤 人員：${user}\n📅 日期：${shortDate}\n\n`;
        msg += `[ 今日工作紀錄 ]\n`;
        msg += works.map(w => `• ${w}`).join('\n') + `\n\n`;
        msg += `[ 待辦執行進度 ]\n`;
        msg += todos.map(t => `${t.done?'✅':'⬜'} ${t.text}`).join('\n');
        
        const el = document.createElement('textarea');
        el.value = msg; document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el);

        document.getElementById('summary-text').innerText = msg;
        document.getElementById('modal').style.display = 'flex';
    }

    function goToLine() {
        window.location.href = `https://line.me/R/nv/recommendOA/@line`;
        document.getElementById('modal').style.display = 'none';
    }

    function confirmClear() {
        if(confirm("確定要清空當前所有填寫內容嗎？")) {
            works = []; todos = [];
            localStorage.removeItem(STORAGE_KEY);
            updateDisplay();
            alert("內容已清空。");
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
