<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>貫坊首席 | 工作日誌系統</title>
    <style>
        :root {
            --bg-color: #fcfcfc; --card-bg: #ffffff; --text-main: #222222; --text-sub: #999999;
            --accent: #000000; --border-light: #f0f0f0; --radius-lg: 16px; --radius-md: 12px;
        }
        body { font-family: "Noto Sans TC", "PingFang TC", sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background-color: var(--card-bg); padding: 40px 30px; border-radius: var(--radius-lg); box-shadow: 0 10px 40px rgba(0,0,0,0.04); box-sizing: border-box; }
        h2 { text-align: center; letter-spacing: 3px; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 30px; margin-top:0; font-weight: 600; }
        label { display: block; margin-top: 20px; font-size: 13px; color: var(--text-sub); letter-spacing: 1px; font-weight: 500; }
        select, input { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: var(--radius-md); font-size: 16px; box-sizing: border-box; margin-top: 5px; outline: none; transition: border 0.3s; }
        select:focus, input:focus { border-color: #000; }
        
        /* 妳要求的黑色新增按鍵 */
        .btn-add { 
            background: #000000; 
            color: #ffffff; 
            padding: 12px 24px; 
            white-space: nowrap; 
            border-radius: var(--radius-md); 
            border: none; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn-add:active { opacity: 0.8; }

        .list-box { background: #fbfbfb; border-radius: var(--radius-md); padding: 15px; border: 1px solid #f0f0f0; margin: 10px 0 20px; font-size: 14px; min-height: 40px; line-height: 1.6; }
        .todo-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f2f2f2; cursor: pointer; }
        .todo-item:last-child { border-bottom: none; }
        .todo-item.done span { text-decoration: line-through; color: #ccc; }
        .todo-checkbox { width: 18px; height: 18px; margin-right: 12px; accent-color: #000; }

        .btn-main { background: #000; color: #fff; width: 100%; padding: 18px; font-size: 17px; font-weight: 600; border-radius: var(--radius-md); margin-top: 20px; border: none; cursor: pointer; letter-spacing: 2px; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: var(--radius-lg); text-align: center; }
        pre { text-align: left; background: #f8f8f8; padding: 15px; border-radius: 8px; font-size: 13px; white-space: pre-wrap; max-height: 250px; overflow-y: auto; margin: 15px 0; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>貫坊首席 日誌</h2>
    
    <label>日誌日期</label>
    <input type="date" id="log-date">

    <label>執行人員</label>
    <select id="user">
        <option value="小魚老師">小魚老師</option>
        <option value="南南老師">南南老師</option>
        <option value="貫坊首席">貫坊首席</option>
    </select>

    <label>今日工作紀錄</label>
    <div class="flex-row">
        <input type="text" id="work-input" placeholder="做了什麼？">
        <button class="btn-add" onclick="addWork()">新增</button>
    </div>
    <div id="work-display" class="list-box">尚未輸入紀錄</div>

    <label>待辦事項</label>
    <div class="flex-row">
        <input type="text" id="todo-input" placeholder="待辦項目">
        <button class="btn-add" onclick="addTodo()">新增</button>
    </div>
    <div id="todo-display" class="list-box">尚未輸入待辦</div>

    <button class="btn-main" onclick="processAll()">生成並複製文字</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">確認彙報內容</h3>
        <p style="font-size:13px; color:var(--text-sub)">內容已自動複製至剪貼簿</p>
        <pre id="summary-text"></pre>
        <button class="btn-main" onclick="goToLine()">確認並前往 LINE</button>
        <button style="background:none; border:none; color:var(--text-sub); margin-top:15px; cursor:pointer" onclick="closeModal()">取消並手動複製</button>
    </div>
</div>

<script>
    let works = []; let todos = [];
    const STORAGE_KEY = 'LKF_Diary_Cache_v3';

    window.onload = () => {
        document.getElementById('log-date').valueAsDate = new Date();
        const cache = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (cache) {
            works = cache.works || []; todos = cache.todos || [];
            document.getElementById('user').value = cache.user;
            document.getElementById('log-date').value = cache.date || document.getElementById('log-date').value;
            updateDisplay();
        }
    };

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            date: document.getElementById('log-date').value,
            user: document.getElementById('user').value,
            works, todos
        }));
    }

    function addWork() {
        let val = document.getElementById('work-input').value;
        if(!val) return; works.push(val); updateDisplay();
        document.getElementById('work-input').value = ''; save();
    }

    function addTodo() {
        let val = document.getElementById('todo-input').value;
        if(!val) return; todos.push({text: val, done: false}); updateDisplay();
        document.getElementById('todo-input').value = ''; save();
    }

    function toggleTodo(i) {
        todos[i].done = !todos[i].done; updateDisplay(); save();
    }

    function updateDisplay() {
        document.getElementById('work-display').innerHTML = works.map(w => `• ${w}<br>`).join('') || '尚未輸入紀錄';
        document.getElementById('todo-display').innerHTML = todos.map((t,i) => 
            `<div class="todo-item ${t.done?'done':''}" onclick="toggleTodo(${i})">
                <input type="checkbox" class="todo-checkbox" ${t.done?'checked':''}>
                <span>${t.text}</span>
            </div>`).join('') || '尚未輸入待辦';
    }

    async function processAll() {
        if(!works.length && !todos.length) return alert("內容是空的喔！");
        
        const dateInput = document.getElementById('log-date').value;
        const dateObj = new Date(dateInput);
        const shortDate = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
        const user = document.getElementById('user').value;
        const workStr = works.map(w => `• ${w}`).join('\n');
        const todoStr = todos.map(t => `${t.done?'✅':'⬜'} ${t.text}`).join('\n');

        const msg = `====================
✨【貫坊首席 | 工作彙報】✨
====================
👤 人員：${user}
📅 日期：${shortDate}

--------------------
📍 今日工作內容：
--------------------
${workStr}

--------------------
📝 待辦執行進度：
--------------------
${todoStr}

====================`;
        
        const el = document.createElement('textarea');
        el.value = msg; document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el);

        document.getElementById('summary-text').innerText = msg;
        document.getElementById('modal').style.display = 'flex';
    }

    function goToLine() {
        window.location.href = `https://line.me/R/nv/recommendOA/@line`;
        works = []; todos = []; 
        localStorage.removeItem(STORAGE_KEY);
        updateDisplay();
        document.getElementById('modal').style.display = 'none';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
